services:
  espocrm-mcp:
    build: .
    image: espocrm/mcp-server:0.1.0
    restart: unless-stopped
    environment:
      ESPOCRM_BASE_URL: ${ESPOCRM_BASE_URL:?set ESPOCRM_BASE_URL}
      ESPOCRM_AUTH_MODE: oauth
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_PATH: /mcp
      # Public HTTPS URL this server is reached at (the OAuth issuer / resource identifier).
      MCP_OAUTH_ISSUER_URL: ${MCP_OAUTH_ISSUER_URL:?set MCP_OAUTH_ISSUER_URL}
      # 32-byte key that seals access/refresh tokens: `openssl rand -base64 32`.
      MCP_OAUTH_ENCRYPTION_KEY: ${MCP_OAUTH_ENCRYPTION_KEY:?set MCP_OAUTH_ENCRYPTION_KEY}
      MCP_READ_ONLY: "true"
      MCP_ENTITY_TYPES: Lead,Contact,Account,Opportunity
    ports:
      - "3000:3000"
