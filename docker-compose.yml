services:
  espocrm-mcp:
    build: .
    image: espocrm/mcp-server:0.1.0
    restart: unless-stopped
    environment:
      ESPOCRM_BASE_URL: ${ESPOCRM_BASE_URL:?set ESPOCRM_BASE_URL}
      ESPOCRM_AUTH_MODE: passthrough
      MCP_TRANSPORT: http
      MCP_HTTP_PORT: "3000"
      MCP_HTTP_PATH: /mcp
      MCP_READ_ONLY: "true"
      MCP_ENTITY_TYPES: Lead,Contact,Account,Opportunity
    ports:
      - "3000:3000"
